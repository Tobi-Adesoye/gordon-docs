<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gordon Engine | API Docs</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; position: relative; }
        .copy-btn { position: absolute; top: 5px; right: 5px; cursor: pointer; font-size: 12px; }
        .btn { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Gordon Engine API</h1>
    
    <h2>Test Output</h2>
    <pre id="output">Status: Waiting...</pre>
    <button class="btn" onclick="copyOutput()">Copy Result</button>
    <br><br>
    <button class="btn" onclick="checkHealth()">Test Health Check</button>

    <script>
        async function checkHealth() {
            const out = document.getElementById('output');
            const res = await fetch('https://gordon-core-engine.onrender.com/health');
            const text = await res.text();
            out.innerText = text;
        }

        function copyOutput() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
